<!doctype html>
<html lang="{{ site.lang | default: 'de-DE' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: page.summary | default: site.description | strip_html | normalize_whitespace }}">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body>
    {% include header.html %}
    <main id="inhalt" class="site-main">
      {{ content }}
    </main>
    {% include footer.html %}
    <script src="{{ '/assets/js/site-version.js' | relative_url }}" data-version-url="{{ '/site-version.json' | relative_url }}" defer></script>
  </body>
</html>
